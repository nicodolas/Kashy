<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="kgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="linegrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- K shape built from paths (no text, renders at all sizes) -->
  <!-- Left vertical bar of K -->
  <rect x="112" y="96" width="80" height="320" rx="12" fill="url(#kgrad)"/>

  <!-- Top-right diagonal of K (upper arm) -->
  <polygon points="192,96 300,96 310,106 220,256 192,256" fill="url(#kgrad)"/>
  <!-- Notch in upper arm -->
  <polygon points="192,210 220,256 192,256" fill="#1e1b4b" opacity="0.3"/>

  <!-- Bottom-right diagonal of K (lower arm) -->
  <polygon points="192,256 220,256 320,406 310,416 200,416 192,406" fill="url(#kgrad)"/>

  <!-- Graph line cutting across the K -->
  <polyline
    points="80,360 145,360 180,310 220,370 265,290 310,340 355,300 400,315 440,270"
    fill="none"
    stroke="url(#linegrad)"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />

  <!-- Dot at end of graph -->
  <circle cx="440" cy="270" r="14" fill="#22d3ee" opacity="0.95"/>
  <circle cx="440" cy="270" r="7" fill="#ffffff"/>
</svg>
