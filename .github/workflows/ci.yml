name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        go: ['1.23', '1.24']

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a  # v5.2.0
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Run tests
        run: go test ./... -count=1 -race

  build:
    name: Build check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: test

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a  # v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -o kashy ./cmd/kashy/

      - name: Build (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -o kashy.exe ./cmd/kashy/

      - name: Build (darwin/amd64)
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -o kashy-darwin ./cmd/kashy/
